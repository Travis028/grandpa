<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app_icon-192.png" />
    <link rel="apple-touch-icon" href="/app_icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>In Loving Memory — APOLLO J. FIZVALENTINE OWINO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function() {
              if (!sessionStorage.getItem('sw_cleared')) {
                sessionStorage.setItem('sw_cleared', '1');
                window.location.reload(true);
              }
            });
          }
        });
      }
    </script>
  </body>
</html>
